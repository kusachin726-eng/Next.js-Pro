name: CI/CD Pipeline

on:
  push:
    branches: ["dev"]

jobs:
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # No condition needed since we strictly run on push to dev
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get Short SHA
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and Export to Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          # Scanning the specific SHORT SHA tag
          tags: ${{ secrets.DOCKER_USERNAME }}/dropty_crm_panel:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/dropty_crm_panel:${{ env.SHORT_SHA }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Always push since we are on dev branch
          push: true
          # Tags: short-sha (history), dev-short-sha (readable history)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dropty_crm_panel:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/dropty_crm_panel:dev-${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Azure Web App Container Image
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.DOCKER_USERNAME }}/dropty_crm_panel:dev-${{ env.SHORT_SHA }}

      - name: Restart Azure Web App
        run: |
          az webapp restart --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
