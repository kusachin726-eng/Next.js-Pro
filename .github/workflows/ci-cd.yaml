name: CI/CD Pipeline - AWS Elastic Beanstalk

on:
  push:
    branches: ["main"]

jobs:
  docker-build-push:
    name: Build, Scan & Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Docker Buildx ─────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Docker Hub Login ───────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Short SHA ──────────────────────────────────────
      - name: Get Short SHA
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      # ── 5. Build image locally for Trivy scan ─────────────
      - name: Build Docker image (load locally)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/crm-panel:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Trivy Scan ─────────────────────────────────────
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/crm-panel:${{ env.SHORT_SHA }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      # ── 7. Push to Docker Hub ─────────────────────────────
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/crm-panel:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKER_USERNAME }}/crm-panel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 8. Generate Dockerrun.aws.json ────────────────────
      - name: Generate Dockerrun.aws.json
        run: |
          cat > Dockerrun.aws.json << DOCKERRUN
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${{ secrets.DOCKER_USERNAME }}/crm-panel:${{ env.SHORT_SHA }}",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "3005",
                "HostPort": "80"
              }
            ]
          }
          DOCKERRUN

      # ── 9. Zip deployment package ─────────────────────────
      - name: Zip deployment package
        run: zip deploy.zip Dockerrun.aws.json

      # ── 10. Deploy to AWS Elastic Beanstalk ───────────────
      - name: Deploy to AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: crm-panel
          environment_name: Crm-panel-env
          region: ap-south-1
          version_label: ${{ env.SHORT_SHA }}-${{ github.run_number }}
          deployment_package: deploy.zip
