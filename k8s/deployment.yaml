apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-app
  namespace: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend-app

  template:
    metadata:
      labels:
        app: frontend-app

    spec:
      containers:
        - name: frontend-app
          image: sachin19102001/crm-panel:v3
          imagePullPolicy: Always

          ports:
            - containerPort: 3005

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          env:
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: NEXTAUTH_SECRET

            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: NEXTAUTH_URL

            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: PORT
