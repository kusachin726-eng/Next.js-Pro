version: '3.8'

services:
  app:
    build: .
    container_name: nextjs_app
    restart: unless-stopped
    env_file:
      - .env                  # ← loads all vars from .env file
    expose:
      - "3005"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app